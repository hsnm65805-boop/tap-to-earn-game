
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap to Earn Game</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        h2 { font-size: 24px; margin-bottom: 5px; color: #ffcc00; }
        .score-container { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .coin-btn {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ffe066 0%, #f5b041 100%);
            border-radius: 50%;
            border: 8px solid #f39c12;
            box-shadow: 0 0 25px #f39c12;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.05s ease;
        }
        .coin-btn:active { transform: scale(0.90); }
    </style>
</head>
<body>

    <h2>🪙 TAP THE COIN TO EARN POINTS 🪙</h2>
    <div class="score-container">💰 POINTS: <span id="score">0</span></div>
    
    <div class="coin-btn" onclick="addMoney()">🪙</div>

    <script>
        let currentScore = 0;
        function addMoney() {
            currentScore++;
            document.getElementById('score').innerText = currentScore;
        }
    </script>

</body>
</html>
